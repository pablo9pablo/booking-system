# CONFIGURACION HEROKU
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}

# JPA CONFIG
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# RABBITMQ CONFIG
spring.rabbitmq.addresses=${CLOUDAMQP_URL}

# SEGURIDAD (Auth0)
# Sustituye 'TU-DOMAIN' por lo que sale en Auth0 (ej: dev-xyz.us.auth0.com)
# ˇIMPORTANTE! Debe terminar con una barra '/'
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-nwzo8bvlomnikggy.us.auth0.com/

# Sustituye esto por el Identifier que pusiste (ej: https://erasmus-booking-api)
spring.security.oauth2.resourceserver.jwt.audiences=https://erasmus-booking-api